version: '3.8'

services:
  # NestJS Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=taskflow
      - POSTGRES_PASSWORD=taskflow_secret
      - POSTGRES_DB=taskflow_users
      - MONGODB_URI=mongodb://mongo:27017/taskflow
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=taskflow-super-secret-jwt-key
      - JWT_EXPIRATION=7d
      - PORT=3001
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - postgres
      - mongo
      - redis
    restart: unless-stopped

  # PostgreSQL - Users & Workspaces
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=taskflow
      - POSTGRES_PASSWORD=taskflow_secret
      - POSTGRES_DB=taskflow_users
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # MongoDB - Boards & Tasks
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # Redis - Bull Queue
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  redis_data:
